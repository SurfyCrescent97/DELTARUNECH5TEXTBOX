	<script src="Scripts/gif.js"></script>
	<script src="Scripts/gifuct.bundle.js"></script>
	<script>
		var rainbow = [
			"#FF8A8A", 
			"#FFAC87", 
			"#FFF8A1", 
			"#AEFFBC", 
			"#84F9FF", 
			"#86A7FF", 
			"#C8A2FF", 
			"#E2A8FC" 
		];

		var frames = [];
		var previewImage = document.getElementById("previewimage");
		var pinkshake = [];
		var pinkspr = "happy.gif";
		var pinktail = false;
		var pinkindex = 0;
		var pinkoffsetx = 0;
		var pinkoffsety = 0;

		var ghostpinkshake = [];
		var ghostpinkspr = "nya.gif";
		var ghostpinktail = false;
		var ghostpinkindex = 0;
		var ghostpinkoffsetx = 0;
		var ghostpinkoffsety = 0;

		window.addEventListener("DOMContentLoaded", async () => {
			window.canvas = document.getElementById("textbox");
			window.ctx = canvas.getContext("2d", { willReadFrequently: true });
			window.ctx.imageSmoothingEnabled = false;
		});

		window.onload = async () =>
		{
			await set_preview_image("Assets/Images/textbox.png");
		};
		
		var animateddelayInput = document.getElementById("animateddelay");
		var animatedrestartDelayInput = document.getElementById("animatedrestartdelay");

		function getFileExtension(path)
		{
			return path.split(".").pop().toLowerCase();
		}

		function downloadRESULT()
		{
			var previewImage = document.getElementById("previewimage");

			if (!previewImage.src)
				return;

			var format = previewImage.src.match(/image\/([^;]+)/)?.[1] || "png";

			var link = document.createElement("a");
			link.download = `Surfy's DELTARUNE textbox.${format}`;
			link.href = previewImage.src;
			link.click();
		}

		function set_preview_image(src)
		{
			if (!src)
			{
				previewImage.style.display = "none";
				previewImage.removeAttribute("src");
				return;
			}

			previewImage.src = src;
			previewImage.style.display = "block";
		}

		async function draw_custom_icon(file)
		{
			if (!file)
				return null;

			return new Promise(function(resolve)
			{
				var img = new Image();

				img.onload = function()
				{
					window.ctx.drawImage(img, 26, 24, 40, 40);
					URL.revokeObjectURL(img.src);
					resolve(img);
				};

				img.src = URL.createObjectURL(file);
			});
		}

		function textcolor(speaker)
		{
			var colors = {
				aqua: "#84F9FF",
				seth: "#E2A8FC",
				yellow: "#FFF8A1",
				orange: "#FFAC87",
				blue: "#86A7FF",
				green: "#AEFFBC",
				pink: "#F88379",
				ghostpink: "#F88379",
				flowery: "#FFFFFF"
			};

			return colors[speaker] || "#FFFFFF";
		}	

		function gifFrameToPNGUrl(path, frameIndex)
		{
			return fetch(path)
				.then(function(res)
				{
					return res.arrayBuffer();
				})
				.then(function(buffer)
				{
					var gif = gifuct.parseGIF(buffer);
					var frames = gifuct.decompressFrames(gif, true);
					var frame = frames[Math.max(0, Math.min(Number(frameIndex), frames.length - 1))] || frames[0];
					
					var tempSurface = document.createElement("canvas");
					tempSurface.width = gif.lsd.width;
					tempSurface.height = gif.lsd.height;

					var tempctx = tempSurface.getContext("2d");
					tempctx.clearRect(0, 0, tempSurface.width, tempSurface.height);
					var imageData = new ImageData(new Uint8ClampedArray(frame.patch), frame.dims.width, frame.dims.height);
					tempctx.putImageData(imageData, frame.dims.left, frame.dims.top);

					return new Promise(function(resolve, reject)
					{
						tempSurface.toBlob(function(blob)
						{
							if (!blob)
							{
								reject(new Error("Failed to encode GIF frame"));
								return;
							}

							var url = URL.createObjectURL(blob);
							resolve(url);
						}, "image/png");
					});
				});
		}

		function draw_image(thectx, path, x, y, xscale = 1, yscale = 1, originx = 0, originy = 0, frame = 0)
		{
			return new Promise(function(resolve)
			{
				var isgif = getFileExtension(path) == "gif";
				var source;

				function draw(src)
				{
					if (!src)
					{
						resolve();
						return;
					}

					if (src instanceof Image)
					{
						thectx.drawImage(src, x - originx * xscale, y - originy * yscale, src.width * xscale, src.height * yscale);

						resolve();
						return;
					}

					var image = new Image();

					image.onload = function()
					{
						thectx.drawImage(image, x - originx * xscale, y - originy * yscale, image.width * xscale, image.height * yscale);

						resolve();
					};

					image.src = src;
				}

				if (isgif)
				{
					gifFrameToPNGUrl(path, frame).then(function(url)
					{
						draw(url);
					});

					return;
				}

				source = Array.isArray(path) ? path[frame % path.length] : path;

				draw(source);
			});
		}
		async function draw_text(thectx, text, x, y, width, col)
		{
			thectx.font = "32px MAINFONT";
			
			var output = "";
			var lineHeight = 36;
			var letterSpacing = 2;
			var extraspacing = 8;
			var spacespacing = 9;

			function measureLine(str)
			{
				str = str.replace(/\s+$/, "");

				var w = 0;

				for (var i = 0; i < str.length; i++)
				{
					w += thectx.measureText(str[i]).width;

					if (i < str.length - 1)
						w += letterSpacing;

					if (str[i] === "'" || str[i] === "," || str[i] === "." || str[i] === "!" || str[i] === "?")
						w += extraspacing;

					if (str[i] === " ")
						w += spacespacing;
				}

				return w;
			}

			function drawLine(str, drawX, drawY)
			{
				var currentX = drawX;

				for (var i = 0; i < str.length; i++)
				{
					var speakerSelect = document.getElementById("speaker");
					var ch = str[i];

					var grad = thectx.createLinearGradient(currentX, drawY - 30, currentX, drawY);
					grad.addColorStop(0.0, "#FFFFFF");

					var colorMode = document.getElementById("colormode");

					if (colorMode.value == "rainbow" && speakerSelect.value == "custom")
    					grad.addColorStop(1.0, rainbow[i % rainbow.length]);
					else
						grad.addColorStop(1.0, col);

					thectx.fillStyle = grad;
					thectx.fillText(ch, currentX, drawY);

					currentX += thectx.measureText(ch).width + letterSpacing;

					if (ch === "'" || ch === "," || ch === "." || ch === "!" || ch === "?")
						currentX += extraspacing;

					if (ch === " ")
						currentX += spacespacing;
				}
			}

			var lines = text.split("\n");
			var currentY = y;

			for (var l = 0; l < lines.length; l++)
			{
				var tokens = lines[l].match(/\S+|\s+/g) || [];
				var line = "";

				for (var i = 0; i < tokens.length; i++)
				{
					var token = tokens[i];

					if (token === "")
						continue;

					var testLine = line + token;

					if (measureLine(testLine) > width && line !== "")
					{
						var finalLine = line.replace(/\s+$/, "");
						drawLine(finalLine, x, currentY);

						if (output !== "")
							output += "\n";
						output += finalLine;
						currentY += lineHeight;
						line = token.replace(/^\s+/, "");
						continue;
					}

					if (measureLine(token) > width)
					{
						for (var j = 0; j < token.length; j++)
						{
							var test = line + token[j];

							if (measureLine(test) > width && line !== "")
							{
								drawLine(line, x, currentY);
								if (output !== "")
									output += "\n";
								output += line;
								currentY += lineHeight;
								line = "";
							}

							line += token[j];
						}
					}
					else
					{
						line += token;
					}
				}

				if (line !== "")
				{
					drawLine(line, x, currentY);

					if (output !== "")
						output += "\n";
					output += line;
					currentY += lineHeight;
				}
			}
			return output;
		}	

		async function rendertextbox(speaker = "none", text = "")
		{
			
			window.ctx.clearRect(0, 0, window.canvas.width, window.canvas.height);
			window.canvas.width = 594;
			window.canvas.height = 168;

			let speakerasset = null;
			let speakercol = null;

			let textx = 98;
			let texty = 54;
			let textwidth = 474.45;
			let textboxoffsety = 0;

			let file = document.getElementById("customicon").files[0];

			if (speaker === "custom")
			{
				speakercol = document.getElementById("customcolor").value;
			}
			else if (speaker == "pink" || speaker == "ghostpink")
			{
				var speakercolpinkval = "pinkcoralpink";
				if (speaker == "ghostpink")
					speakercolpinkval = "ghostpinkcoralpink";

				speakercol = document.getElementById(speakercolpinkval).checked ? textcolor(speaker) : "#FFFFFF";
				
				if (text.charAt(0) != "*")
					text = "* " + text;
				window.canvas.width = 620;
				window.canvas.height = 230;
				if ((pinkspr == "shocked.png" && speaker == "pink") || (ghostpinkspr == "shocked.png" && speaker == "ghostpink"))
					window.canvas.width = 640;
				if (ghostpinkspr == "yell.gif" && speaker == "ghostpink")
					ghostpinkoffsety = -30;
				else
					ghostpinkoffsety = 0;
				textx = 36;
				textboxoffsety = 63;
				textwidth = 380;
			}
			else if (speaker == "flowery")
			{
				if (text.charAt(0) != "*")
					text = "* " + text;
				textx = 149.999;
				textwidth = 425.3;
				speakerasset = `Assets/Images/face/${speaker}${String(document.getElementById("floweryexpression").value)}.png`;
				speakercol = textcolor(speaker);
			}
			else 
			{
				speakerasset = `Assets/Images/miniface/${speaker}.png`;
				speakercol = textcolor(speaker);
			}

			await draw_image(window.ctx, "Assets/Images/textbox.png", 0, textboxoffsety, 1, 1, 0, 0, 0);

			
			if (speaker === "pink" && pinkspr)
			{
				await draw_image(window.ctx, `Assets/Images/pinkspeaker/${pinkspr}`, 392 + 116 + pinkoffsetx, 116 + pinkoffsety, 2, 2, 56, 58, pinkindex);
				if (pinktail)
					await draw_image(window.ctx, `Assets/Images/pinkspeaker/tail.png`, 392 + 116 + pinkoffsetx, 116 + pinkoffsety, 2, 2, 56, 58, 0);
			}
			else if (speaker === "ghostpink" && ghostpinkspr)
			{
				await draw_image(window.ctx, `Assets/Images/pinkghost/${ghostpinkspr}`, 392 + 116 + ghostpinkoffsetx, 116 + ghostpinkoffsety, 2, 2, 56, 58, ghostpinkindex);
				if (ghostpinktail)
					await draw_image(window.ctx, `Assets/Images/pinkghost/tail.png`, 392 + 116 + ghostpinkoffsetx, 116 + ghostpinkoffsety, 2, 2, 56, 58, 0);
			}
			else if (speaker === "flowery")
				await draw_image(window.ctx, speakerasset, 44, 36 + textboxoffsety, 2, 2);
			else if (speaker === "custom")
				await draw_custom_icon(file);
			else if (speaker !== "none" && speakerasset)
				await draw_image(window.ctx, speakerasset, 26, 24 + textboxoffsety, 2, 2);

			switch (pinkspr)
			{
				case "happy.gif":
				case "wink.gif":
				case "nya.gif":
				case "nya2.gif":
				case "concerned.gif":
				case "angry.gif":
				case "sadblush.gif":
				case "angryblush.gif":
					pinkindex = pinkindex == 1 ? 0 : 1;
					break;
			}

			switch (ghostpinkspr)
			{
				case "nya.gif":
				case "nya2.gif":
				case "blush.gif":
				case "concerned.gif":
				case "sad.gif":
				case "yell.gif":
					ghostpinkindex = ghostpinkindex == 1 ? 0 : 1;
					break;
			}

			const resulttext = await draw_text(window.ctx, text, textx, texty + textboxoffsety, textwidth, speakercol, 2);

			return {
				text: resulttext,
				asset: speakerasset,
				col: speakercol
			};
		}

		async function add_frame()
		{
			frames.push(window.canvas.toDataURL("image/png"));

			window.ctx.clearRect(0, 0, window.canvas.width, window.canvas.height);
		}

		function clear_frames()
		{
			frames = [];
		}

		async function generate_frames()
		{
			var currentFrame = window.canvas.toDataURL("image/png");
			var selectedFrames = frames.length > 0 ? frames : [currentFrame];

			if (selectedFrames.length <= 1)
			{
				set_preview_image(selectedFrames[0]);
				return;
			}

			if (typeof window.GIF === "undefined")
			{
				set_preview_image(selectedFrames[0]);
				return;
			}

			var gif = new window.GIF({
				workers: 2,
				quality: 10,
				width: window.canvas.width,
				height: window.canvas.height,
				workerScript: "./Scripts/gif.worker.js"
			});

			var lastFrame = new Image();
			lastFrame.src  = selectedFrames[selectedFrames.length - 1];

			for (var i = 0; i < selectedFrames.length; i++)
			{
				var frameImage = new Image();
				frameImage.src = selectedFrames[i];
				await new Promise(function(resolve)
				{
					frameImage.onload = resolve;
				});
				gif.addFrame(frameImage, { copy: true, delay: Number(animateddelayInput.value) });
			}
			
			gif.addFrame(lastFrame, { copy: true, delay: Number(animatedrestartDelayInput.value) });

			var gifDataUrl = await new Promise(function(resolve, reject)
			{
				gif.on("finished", function(blob)
				{
					var reader = new FileReader();
					reader.onloadend = function()
					{
						resolve(reader.result);
					};
					reader.onerror = reject;
					reader.readAsDataURL(blob);
				});
				gif.render();
			});

			set_preview_image(gifDataUrl);
		}
		

		document.getElementById("isanimated").addEventListener("change", function()
		{
			document.getElementById("animatedcontrols").style.display = this.checked ? "block" : "none";
		});


		document.getElementById("speaker").addEventListener("change", function()

					break;
				
				case "flowery":
					document.getElementById("flowerycontrols").style.display = "block";
					break

				default:
					break;
			}
		});

		async function generate()
		{
			clear_frames();
			pinkshake = [];
			ghostpinkshake = [];
			pinkindex = 0;
			ghostpinkindex = 0;
			pinktail = false;
			ghostpinktail = false;
			pinkoffsetx = 0;
			ghostpinkoffsetx = 0;
			pinkoffsety = 0;
			ghostpinkoffsety = 0;

			switch (document.getElementById("pinkexpression").value)
			{
				case "happy":
					pinkspr = "happy.gif";
					pinktail = true;
					break;
				case "wink":
					pinkspr = "wink.gif";
					pinktail = true;
					break;
				case "nya":
					pinkspr = "nya.gif";
					break;
				case "nya2":
					pinkspr = "nya2.gif";
					break;
				case "tongue":
					pinkspr = "tongue.png";
					break;
				case "concerned":
					pinkspr = "concerned.gif";
					pinktail = true;
					break;
				case "angry":
					pinkspr = "angry.gif";
					break;
				case "sadblush":
					pinkspr = "sadblush.gif";
					break;
				case "angryblush":
					pinkspr = "angryblush.gif";
					break;
				case "shocked":
					pinkspr = "shocked.png";
					pinkshake = [0, 6, -6, 4, -4, 2, -2, 0];
					break;
			}

			switch (document.getElementById("ghostpinkexpression").value)
			{
				case "nya":
					ghostpinkspr = "nya.gif";
					break;
				case "nya2":
					ghostpinkspr = "nya2.gif";
					break;
				case "blush":
					ghostpinkspr = "blush.gif";
					ghostpinktail = true;
					break;
				case "concerned":
					ghostpinkspr = "concerned.gif";
					ghostpinktail = true;
					break;
				case "sad":
					ghostpinkspr = "sad.gif";
					break;
				case "yell":
					ghostpinkspr = "yell.gif";
					break;
				case "shock":
					ghostpinkspr = "shock.png";
					ghostpinkshake = [0, 6, -6, 4, -4, 2, -2, 0];
					break;
			}

			var animated = document.getElementById("isanimated").checked;
			var speaker = document.getElementById("speaker").value;
			var text = document.getElementById("textboxtext").value;

			if (animated)
			{
				var prerendertext = (await rendertextbox(speaker, text)).text;
				await rendertextbox(speaker, "");
				await set_preview_image(document.getElementById("textbox").toDataURL("image/png"));

				let current = "";

				var shakeindex = 0;

				for (var piece of prerendertext)
				{
					if (piece === "\n")
					{
						current += "\n";
						continue;
					}

					if (speaker == "pink")
					{
						pinkoffsetx = pinkshake[shakeindex] ?? 0;
						shakeindex++;
					}

					if (speaker == "ghostpink")
					{
						ghostpinkoffsetx = ghostpinkshake[shakeindex] ?? 0;
						shakeindex++;
					}
					
					current += piece;

					await rendertextbox(speaker, current);
					await add_frame();
				}

				if (speaker == "pink")
				{
					while (shakeindex < pinkshake.length)
					{
						pinkoffsetx = pinkshake[shakeindex];
						shakeindex++;

						await rendertextbox(speaker, current);
						await add_frame();
					}
				}

				if (speaker == "ghostpink")
				{
					while (shakeindex < ghostpinkshake.length)
					{
						ghostpinkoffsetx = ghostpinkshake[shakeindex];
						shakeindex++;

						await rendertextbox(speaker, current);
						await add_frame();
					}
				}

				if (speaker == "pink")
				{
					switch (pinkspr)
					{
						case "happy.gif":
						case "wink.gif":
						case "nya.gif":
						case "nya2.gif":
						case "concerned.gif":
						case "angry.gif":
						case "sadblush.gif":
						case "angryblush.gif":
							pinkindex = 0;
							await rendertextbox(speaker, current);
							await add_frame();
							break;
					}
				}

				if (speaker == "ghostpink")
				{
					switch (pinkspr)
					{
						case "nya.gif":
						case "nya2.gif":
						case "blush.gif":
						case "concerned.gif":
						case "sad.gif":
						case "yell.gif":
							ghostpinkindex = 0;
							await rendertextbox(speaker, current);
							await add_frame();
							break;
					}
				}
			}
			else
			{
				await rendertextbox(speaker, text);
				await add_frame();
			}
			await generate_frames();
		}

		updateColorMode();

		function validateAnimatedSettings() 
		{
			if (isNaN(Number(animateddelayInput.value)) || animateddelayInput.value === "")
				animateddelayInput.value = 50;

			if (isNaN(Number(animatedrestartDelayInput.value)) || animatedrestartDelayInput.value === "")
				animatedrestartDelayInput.value = 300;
		}

		function updateflowerypreviewexpression()
		{
			document.getElementById("floweryexpressionpreview").src = `Assets/Images/face/flowery${String(document.getElementById("floweryexpression").value)}.png`;
		}

		floweryexpression.addEventListener("change", updateflowerypreviewexpression);
		animateddelayInput.addEventListener("change", validateAnimatedSettings);
		animatedrestartDelayInput.addEventListener("change", validateAnimatedSettings);
	</script>
