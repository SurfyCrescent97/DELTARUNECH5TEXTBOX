<!DOCTYPE html>
<html>
	<head>
		<link rel="preload" href="Assets/Fonts/8bitoperator-JVE.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="icon" type="image/png" href="Assets/Images/icon.png">

	</head>
	<style>
		@font-face
		{
			font-family: "MAINFONT";
			src: url("Assets/Fonts/8bitoperator-JVE.woff2") format("woff2");
			font-display: swap;
		}

		body
		{
			margin: 0;
			min-height: 100vh;

			display: flex;
			justify-content: center;
			align-items: center;

			padding: 24px;
			box-sizing: border-box;

			background-color: #1f1f1f;
			background-image: url("Assets/Images/background.png");
			background-repeat: repeat;
			background-position: top left;

			image-rendering: pixelated;

			font-family: "MAINFONT", Arial, sans-serif;
			color: #f7f2e8;
		}

		#layout
		{
			display: flex;
			flex-direction: column;
			align-items: center;

			gap: 12px;
			width: 100%;
		}

		.panel
		{
			width: min(700px, 100%);
			margin: 0;

			padding: 18px;

			background: rgba(33, 33, 33, 0.86);
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 14px;

			box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
			backdrop-filter: blur(4px);

		}

		#bannerbox 
		{
			height: 90px;
			display: flex;
			align-items: center;
			justify-content: center;

			position: relative;
			overflow: hidden;

			background-repeat: repeat;
			background-size: auto; 
			background-position: top left;
		}

		#bannerbox::after {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, 0.25);
			z-index: 1;
		}

		#bannertext {
			font-size: 28px;
			font-weight: normal;

   			 background: linear-gradient(180deg, #d6ffe0, #4dff88, #00ff66);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;

			margin: 0;

			position: relative;
			z-index: 2; 
		}

		#speaker,
		textarea,
		button,
		input
		{
			font-family: "MAINFONT", Arial, sans-serif;

			color: #f7f2e8;
			background: #2e2e2e;

			border: 1px solid #6d674f;
			border-radius: 8px;

			outline: none;
		}

		button
		{
			padding: 8px 14px;
			cursor: pointer;
			transition: 0.1s ease-in-out;
		}

		button:hover

			background: #3a3a3a;
		}

		#speaker
		{
			width: 220px;
			font-size: 18px;
			padding: 8px 10px;
		}

		textarea
		{
			width: min(100%, 560px);
			padding: 10px;
			resize: vertical;
		}

		label
		{
			display: inline-block;
			color: #f7f2e8;
		}

		canvas
		{
			display: block;
			margin: 0 auto;

			border: 1px solid rgba(255, 255, 255, 0.18);
			border-radius: 8px;

			box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
			background: rgba(0, 0, 0, 0.12);

			image-rendering: pixelated;
		}

		#footerbox
		{
			font-size: 14px;
			opacity: 0.85;

	<body>

	<div id="editor">
		<center>

		<div id="bannerbox" class="panel">
			<div id="bannertext"><h1>Surfy's DELTARUNE Chapter 5 Textbox Generator</h1></div>
		</div>
		<br>
		<div id="editorbox" class="panel">

			<select id="speaker">
				<option value="aqua">Aqua</option>
				<option value="seth">Seth</option>
				<option value="yellow">Yellow</option>
				<option value="orange">Orange</option>
				<option value="blue">Blue</option>
				<option value="green">Green</option>
				<option value="custom">Custom</option>
			</select>

			<br><br>

			<div id="customcontrols" style="display:none;">
				<label>
					Color mode:
					<select id="colormode">
						<option value="solid">Solid</option>
					</select>
				</label>
				<label id="solidcolorwrap">
					<br>
					<br>
					Color: <input type="color" id="customcolor">
				</label>
				<br>
				<br>
				<label>Icon: <input type="file" id="customicon"></label>
				<button onclick="clearCustomIcon()">Clear Icon</button>
				<br>
				<br>
			</div>

			<label>
				Text:
				<br>
				<textarea id="textboxtext" rows="4" cols="60"></textarea>
			</label>
			<br>
			<br>
			<button id="generatebutton" onclick="generate()">Generate</button>
			<br>
			<br>
			<canvas id="textbox" width="594" height="168"></canvas>
		</div>
		<br>
		<div id="footerbox" class="panel">
			Copyright © 2026 SurfyCrescent97 (v1.0.0)
			<br>
			Based on <a href="https://www.demirramon.com/generators/undertale_text_box_generator">Demirramon's Undertale Textbox Generator</a>
			<br>
			DELTARUNE © Toby Fox
		</div>

		</center>	
	</div>

	</body>
	<script>

		async function get_custom_icon()
		{
			var file = document.getElementById("customicon").files[0];

			if (!file)
				return Promise.resolve(null);

			return new Promise(function(resolve)
			{
				var img = new Image();

				img.onload = function()
				{
					var canvas = document.createElement("canvas");
					canvas.width = 20;
					canvas.height = 20;

					var ctx = canvas.getContext("2d");
					ctx.imageSmoothingEnabled = true;
					ctx.drawImage(img, 0, 0, 20, 20);

					var result = new Image();

					result.onload = function()
					{
						URL.revokeObjectURL(img.src);
						resolve(result);
					};

					result.src = canvas.toDataURL("image/png");
				};

				img.src = URL.createObjectURL(file);
			});
		}

		function textcolor(speaker)
		{
			var colors = {
				aqua: "#84F9FF",
				seth: "#E2A8FC",
				yellow: "#FFF8A1",
				orange: "#FFAC87",
				blue: "#86A7FF",
				green: "#AEFFBC"
			};

			return colors[speaker] || "#FFFFFF";
		}
		
		function draw_image(ctx, path, x, y, xscale = 1, yscale = 1, originx = 0, originy = 0)
		{
			return new Promise(function(resolve)
			{
				if (path instanceof Image)
				{
					ctx.drawImage(path, x - originx * xscale, y - originy * yscale, path.width * xscale, path.height * yscale);

					resolve();
					return;
				}

				var image = new Image();

				image.onload = function()
				{
					ctx.drawImage(image, x - originx * xscale, y - originy * yscale, image.width * xscale, image.height * yscale);

					resolve();
				};

				image.src = path;
			});
		}

		function draw_text(ctx, text, x, y, width, col)
		{
			ctx.font = "32px MAINFONT";

			var lineHeight = 36;
			var letterSpacing = 2;
			var extraspacing = 8;
			var spacespacing = 9;

			function measureLine(str)
			{
				str = str.replace(/\s+$/, "");

				var w = 0;

				for (var i = 0; i < str.length; i++)
				{
					w += ctx.measureText(str[i]).width;

					if (i < str.length - 1)
						w += letterSpacing;

					if (str[i] === "'" || str[i] === "," || str[i] === "." || str[i] === "!" || str[i] === "?")
						w += extraspacing;

					if (str[i] === " ")
						w += spacespacing;
				}

				return w;
			}

			function drawLine(str, drawX, drawY)
			{
				var currentX = drawX;

				for (var i = 0; i < str.length; i++)
				{
					var ch = str[i];

					var grad = ctx.createLinearGradient(currentX, drawY - 30, currentX, drawY);
					grad.addColorStop(0.0, "#FFFFFF");
					grad.addColorStop(1.0, col);

					ctx.fillStyle = grad;
					ctx.fillText(ch, currentX, drawY);

					currentX += ctx.measureText(ch).width + letterSpacing;

					if (ch === "'" || ch === "," || ch === "." || ch === "!" || ch === "?")
						currentX += extraspacing;

					if (ch === " ")
						currentX += spacespacing;
				}
			}

			var lines = text.split("\n");
			var currentY = y;

			for (var l = 0; l < lines.length; l++)
			{
				var tokens = lines[l].match(/\S+|\s+/g) || [];
				var line = "";

				for (var i = 0; i < tokens.length; i++)
				{
					var token = tokens[i];

					if (token === "")
						continue;

					var testLine = line + token;

					if (measureLine(testLine) > width && line !== "")
					{
						drawLine(line.replace(/\s+$/, ""), x, currentY);
						currentY += lineHeight;
						line = token.replace(/^\s+/, "");
						continue;
					}

					if (measureLine(token) > width)
					{
						for (var j = 0; j < token.length; j++)
						{
							var test = line + token[j];

							if (measureLine(test) > width && line !== "")
							{
								drawLine(line, x, currentY);
								currentY += lineHeight;
								line = "";
							}

							line += token[j];
						}
					}
					else
					{
						line += token;
					}
				}

				if (line !== "")
				{
					drawLine(line, x, currentY);
					currentY += lineHeight;
				}
			}
		}

		async function rendertextbox(speaker = "none", text="")
		{
			var canvas = document.getElementById("textbox");
			var ctx = canvas.getContext("2d");
			ctx.imageSmoothingEnabled = false;

			ctx.clearRect(0, 0, canvas.width, canvas.height);
			
			await draw_image(ctx, "Assets/Images/textbox.png", 0, 0, 1, 1, 0, 0);

			if (speaker == "custom")
			{
				var icon = await get_custom_icon();
				var speakerasset = icon;
				var speakercol = document.getElementById("customcolor").value;
			}
			else
			{
				var speakerasset = `Assets/Images/miniface/${speaker}.png`
				var speakercol = textcolor(speaker);
			}

			
			if (speaker != "none" && speakerasset != null)
				await draw_image(ctx, speakerasset, 26, 24, 2, 2, 0);
			draw_text(ctx, text, 98, 54, 474.45, speakercol, 2);
		}
		
		var speakerSelect = document.getElementById("speaker");
		var customControls = document.getElementById("customcontrols");

		speakerSelect.addEventListener("change", function()
		{
			customControls.style.display = this.value === "custom" ? "block" : "none";
		});

		function clearCustomIcon()
		{
			document.getElementById("customicon").value = "";
			customIconFile = null;
		}
				
		var colorMode = document.getElementById("colormode");
		var solidColorWrap = document.getElementById("solidcolorwrap");

		function updateColorMode()
		{
			solidColorWrap.style.display = colorMode.value === "solid" ? "block" : "none";
		}

		colorMode.addEventListener("change", updateColorMode);
		
		function generate()
		{
			var speaker = document.getElementById("speaker").value;
			var text = document.getElementById("textboxtext").value;
			rendertextbox(speaker, text);
		}

		updateColorMode();
		rendertextbox();
	</script>
</html>
