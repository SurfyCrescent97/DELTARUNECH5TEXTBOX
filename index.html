<!DOCTYPE html>
<html>
	<head>
		<link rel="preload" href="Assets/Fonts/8bitoperator-JVE.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="icon" type="image/png" href="Assets/Images/icon.png">
		<title>Surfy's DELTARUNE Chapter 5 Textbox Generator</title>		
	</head>
	<style>
		@font-face
		{
			font-family: "MAINFONT";
			src: url("Assets/Fonts/8bitoperator-JVE.woff2") format("woff2");
			font-display: swap;
		}

		body
		{
			margin: 0;
			min-height: 100vh;

			display: flex;
			justify-content: center;
			align-items: center;

			padding: 24px;
			box-sizing: border-box;

			background-color: #1f1f1f;
			background-image: url("Assets/Images/background.png");
			background-repeat: repeat;
			background-position: top left;

			image-rendering: pixelated;

			font-family: "MAINFONT", Arial, sans-serif;
			color: #f7f2e8;
		}

		#layout
		{
			display: flex;
			flex-direction: column;
			align-items: center;

			gap: 12px;
			width: 100%;
		}

		.panel
		{
			width: min(700px, 100%);
			margin: 0;

			padding: 18px;

			background: rgba(33, 33, 33, 0.86);
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 14px;

			box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
			backdrop-filter: blur(4px);

			text-align: center;
		}

		#bannerbox 
		{
			height: 90px;
			display: flex;
			align-items: center;
			justify-content: center;

			position: relative;
			overflow: hidden;

			background-repeat: repeat;
			background-size: auto; 
			background-position: top left;
		}

		#bannerbox::after {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, 0.25);
			z-index: 1;
		}

		#bannertext 
		{
			font-size: 28px;
			font-weight: normal;

   			 background: linear-gradient(180deg, #d6ffe0, #4dff88, #00ff66);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;

			margin: 0;

			position: relative;
			z-index: 2; 
		}

		#speaker,
		textarea,
		button,
		input
		{
			font-family: "MAINFONT", Arial, sans-serif;

			color: #f7f2e8;
			background: #2e2e2e;

			border: 1px solid #6d674f;
			border-radius: 8px;

			outline: none;
		}

		button
		{
			padding: 8px 14px;
			cursor: pointer;
			transition: 0.1s ease-in-out;
		}

		button:hover
		{
			background: #3a3a3a;
		}

		#speaker
		{
			width: 220px;
			font-size: 18px;
			padding: 8px 10px;
		}

		textarea
		{
			width: min(100%, 560px);
			padding: 10px;
			resize: vertical;
		}

		label
		{
			display: inline-block;
			color: #f7f2e8;
		}

		canvas
		{
			display: none;
			margin: 0 auto;

			border: 1px solid rgba(255, 255, 255, 0.18);
			border-radius: 8px;

			box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
			background: rgba(0, 0, 0, 0.12);

			image-rendering: pixelated;
		}

		#previewwrap
		{
			margin: 0 auto 10px;
			width: min(100%, 594px);
			display: flex;
			justify-content: center;
		}

		#previewimage
		{
			display: none;
			max-width: 100%;
			border: 1px solid rgba(255, 255, 255, 0.18);
			border-radius: 8px;
			box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
			background: rgba(0, 0, 0, 0.12);
			image-rendering: pixelated;
		}

		#footerbox
		{
			font-size: 14px;
			opacity: 0.85;
		}
	</style>
	<body>

	<div id="editor">
		<center>
			<div id="bannerbox" class="panel">
				<div id="bannertext"><h1>Surfy's DELTARUNE Chapter 5 Textbox Generator</h1></div>
			</div>
			<br>
			<div id="editorbox" class="panel">
				<select id="speaker">
					<optgroup label="Flowers">
						<option value="aqua">Aqua</option>
						<option value="seth">Seth</option>
						<option value="green">Green</option>
						<option value="orange">Orange</option>
						<option value="yellow">Yellow</option>
						<option value="blue">Blue</option>
					</optgroup>
					<optgroup label="Misc.">
						<option value="custom">Custom</option>
					</optgroup>
				</select>
				<div id="customcontrols" style="display:none;">
					<div style="display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap;">
						<label>
							Color mode:
							<select id="colormode">
								<option value="solid">Solid</option>
								<option value="rainbow">Rainbow</option>
							</select>
						</label>

						<label id="solidcolorwrap">
							Color:
							<input type="color" id="customcolor">
						</label>
					</div>

					<div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:10px;">
						<label>
							Icon:
							<input type="file" id="customicon">
						</label>

						<button onclick="clearCustomIcon()">Clear Icon</button>
					</div>
				</div>
				<br>
				<br>
				<label>
					<input type="checkbox" id="isanimated">
					Animated
				</label>
					<div id="animatedcontrols" style="display:none;">
						<label>
							Speed
							<input type="number" id="animatedspeed" value="50" min="1" style="width:60px;">
						</label>

						<label style="margin-left:12px;">
							Restart Delay
							<input type="number" id="animatedrestartdelay" value="300" min="0" style="width:60px;">
						</label>
					</div>
				<br>
				<br>
				<label>
					Text:
					<br>
					<textarea id="textboxtext" rows="4" cols="60"></textarea>
				</label>
				<br>
				<br>
				<button id="generatebutton" onclick="generate()">Generate</button>
				<br>
				<br>
				<div id="previewwrap">
					<img id="previewimage" alt="Textbox preview">
				</div>
				<br>
				<canvas id="textbox" width="594" height="168"></canvas>
				<button onclick="downloadRESULT()">Download Result</button>
			</div>
			<br>
			<div id="footerbox" class="panel">
				Copyright © 2026 SurfyCrescent97 (v1.0.1)
				<br>
				Based on <a href="https://www.demirramon.com/generators/undertale_text_box_generator">Demirramon's Undertale Textbox Generator</a>
				<br>
				DELTARUNE © Toby Fox
			</div>
		</center>	
	</div>

	</body>
	<script src="Scripts/gif.js"></script>
	<script>
		var rainbow = [
			"#FF8A8A", 
			"#FFAC87", 
			"#FFF8A1", 
			"#AEFFBC", 
			"#84F9FF", 
			"#86A7FF", 
			"#C8A2FF", 
			"#E2A8FC" 
		];

		var frames = [];
		var previewImage = document.getElementById("previewimage");

		
		var animatedspeedInput = document.getElementById("animatedspeed");
		var animatedrestartDelayInput = document.getElementById("animatedrestartdelay");

		function downloadRESULT()
		{
			var previewImage = document.getElementById("previewimage");

			if (!previewImage.src)
				return;

			var format = previewImage.src.match(/image\/([^;]+)/)?.[1] || "png";

			var link = document.createElement("a");
			link.download = `Surfy's DELTARUNE textbox.${format}`;
			link.href = previewImage.src;
			link.click();
		}

		function set_preview_image(src)
		{
			if (!src)
			{
				previewImage.style.display = "none";
				previewImage.removeAttribute("src");
				return;
			}

			previewImage.src = src;
			previewImage.style.display = "block";
		}

		async function get_custom_icon()
		{
			var file = document.getElementById("customicon").files[0];

			if (!file)
				return Promise.resolve(null);

			return new Promise(function(resolve)
			{
				var img = new Image();

				img.onload = function()
				{
					var canvas = document.createElement("canvas");
					canvas.width = 20;
					canvas.height = 20;

					var ctx = canvas.getContext("2d", {
						willReadFrequently: true
					});

					ctx.imageSmoothingEnabled = true;
					ctx.drawImage(img, 0, 0, 20, 20);

					var result = new Image();

					result.onload = function()
					{
						URL.revokeObjectURL(img.src);
						resolve(result);
					};

					result.src = canvas.toDataURL("image/png");
				};

				img.src = URL.createObjectURL(file);
			});
		}

		function textcolor(speaker)
		{
			var colors = {
				aqua: "#84F9FF",
				seth: "#E2A8FC",
				yellow: "#FFF8A1",
				orange: "#FFAC87",
				blue: "#86A7FF",
				green: "#AEFFBC"
			};

			return colors[speaker] || "#FFFFFF";
		}
		
		function draw_image(ctx, path, x, y, xscale = 1, yscale = 1, originx = 0, originy = 0, frame = 0)
		{
			return new Promise(function(resolve)
			{
				var source = Array.isArray(path) ? path[frame % path.length] : path;

				if (!source)
				{
					resolve();
					return;
				}

				if (source instanceof Image)
				{
					ctx.drawImage(source, x - originx * xscale, y - originy * yscale, source.width * xscale, source.height * yscale);

					resolve();
					return;
				}

				var image = new Image();

				image.onload = function()
				{
					ctx.drawImage(image, x - originx * xscale, y - originy * yscale, image.width * xscale, image.height * yscale);

					resolve();
				};

				image.src = source;
			});
		}

		async function draw_text(ctx, text, x, y, width, col)
		{
			ctx.font = "32px MAINFONT";
			
			var output = "";
			var lineHeight = 36;
			var letterSpacing = 2;
			var extraspacing = 8;
			var spacespacing = 9;

			function measureLine(str)
			{
				str = str.replace(/\s+$/, "");

				var w = 0;

				for (var i = 0; i < str.length; i++)
				{
					w += ctx.measureText(str[i]).width;

					if (i < str.length - 1)
						w += letterSpacing;

					if (str[i] === "'" || str[i] === "," || str[i] === "." || str[i] === "!" || str[i] === "?")
						w += extraspacing;

					if (str[i] === " ")
						w += spacespacing;
				}

				return w;
			}

			function drawLine(str, drawX, drawY)
			{
				var currentX = drawX;

				for (var i = 0; i < str.length; i++)
				{
					var speakerSelect = document.getElementById("speaker");
					var ch = str[i];

					var grad = ctx.createLinearGradient(currentX, drawY - 30, currentX, drawY);
					grad.addColorStop(0.0, "#FFFFFF");

					var colorMode = document.getElementById("colormode");

					if (colorMode.value == "rainbow" && speakerSelect.value == "custom")
    					grad.addColorStop(1.0, rainbow[i % rainbow.length]);
					else
						grad.addColorStop(1.0, col);

					ctx.fillStyle = grad;
					ctx.fillText(ch, currentX, drawY);

					currentX += ctx.measureText(ch).width + letterSpacing;

					if (ch === "'" || ch === "," || ch === "." || ch === "!" || ch === "?")
						currentX += extraspacing;

					if (ch === " ")
						currentX += spacespacing;
				}
			}

			var lines = text.split("\n");
			var currentY = y;

			for (var l = 0; l < lines.length; l++)
			{
				var tokens = lines[l].match(/\S+|\s+/g) || [];
				var line = "";

				for (var i = 0; i < tokens.length; i++)
				{
					var token = tokens[i];

					if (token === "")
						continue;

					var testLine = line + token;

					if (measureLine(testLine) > width && line !== "")
					{
						var finalLine = line.replace(/\s+$/, "");
						drawLine(finalLine, x, currentY);

						if (output !== "")
							output += "\n";
						output += finalLine;
						currentY += lineHeight;
						line = token.replace(/^\s+/, "");
						continue;
					}

					if (measureLine(token) > width)
					{
						for (var j = 0; j < token.length; j++)
						{
							var test = line + token[j];

							if (measureLine(test) > width && line !== "")
							{
								drawLine(line, x, currentY);
								if (output !== "")
									output += "\n";
								output += line;
								currentY += lineHeight;
								line = "";
							}

							line += token[j];
						}
					}
					else
					{
						line += token;
					}
				}

				if (line !== "")
				{
					drawLine(line, x, currentY);

					if (output !== "")
						output += "\n";
					output += line;
					currentY += lineHeight;
				}
			}
			return output;
		}	

		async function rendertextbox(speaker = "none", text = "")
		{
			var canvas = document.getElementById("textbox");
			var ctx = canvas.getContext("2d", { willReadFrequently: true });
			ctx.imageSmoothingEnabled = false;

			ctx.clearRect(0, 0, canvas.width, canvas.height);

			await draw_image(ctx, "Assets/Images/textbox.png", 0, 0, 1, 1, 0, 0, 0);

			let speakerasset = null;
			let speakercol = null;

			if (speaker === "custom")
			{
				speakerasset = await get_custom_icon();
				speakercol = document.getElementById("customcolor").value;
			}
			else
			{
				speakerasset = `Assets/Images/miniface/${speaker}.png`;
				speakercol = textcolor(speaker);
			}

			if (speaker !== "none" && speakerasset)
				await draw_image(ctx, speakerasset, 26, 24, 2, 2, 0);

			const resulttext = await draw_text(ctx, text, 98, 54, 474.45, speakercol, 2);

			return {
				text: resulttext,
				asset: speakerasset,
				col: speakercol
			};
		}

		async function add_frame()
		{
			var canvas = document.getElementById("textbox");
			frames.push(canvas.toDataURL("image/png"));

			var ctx = canvas.getContext("2d", { willReadFrequently: true });
			ctx.clearRect(0, 0, canvas.width, canvas.height);
		}

		function clear_frames()
		{
			frames = [];
		}

		async function generate_frames()
		{
			var canvas = document.getElementById("textbox");
			var currentFrame = canvas.toDataURL("image/png");
			var selectedFrames = frames.length > 0 ? frames : [currentFrame];

			if (selectedFrames.length <= 1)
			{
				set_preview_image(selectedFrames[0]);
				return;
			}

			if (typeof window.GIF === "undefined")
			{
				set_preview_image(selectedFrames[0]);
				return;
			}

			var gif = new window.GIF({
				workers: 2,
				quality: 10,
				width: canvas.width,
				height: canvas.height,
				workerScript: window.location.origin + "/Scripts/gif.worker.js"
			});
			
			var lastFrame = new Image();
			lastFrame.src  = selectedFrames[selectedFrames.length - 1];

			for (var i = 0; i < selectedFrames.length; i++)
			{
				var frameImage = new Image();
				frameImage.src = selectedFrames[i];
				await new Promise(function(resolve)
				{
					frameImage.onload = resolve;
				});
				gif.addFrame(frameImage, { copy: true, delay: Number(animatedspeedInput.value) });
			}
			
			gif.addFrame(lastFrame, { copy: true, delay: Number(animatedrestartDelayInput.value) });

			var gifDataUrl = await new Promise(function(resolve, reject)
			{
				gif.on("finished", function(blob)
				{
					var reader = new FileReader();
					reader.onloadend = function()
					{
						resolve(reader.result);
					};
					reader.onerror = reject;
					reader.readAsDataURL(blob);
				});
				gif.render();
			});

			set_preview_image(gifDataUrl);
		}
		
		var speakerSelect = document.getElementById("speaker");
		var customControls = document.getElementById("customcontrols");


		document.getElementById("isanimated").addEventListener("change", function()
		{
			document.getElementById("animatedcontrols").style.display = this.checked ? "block" : "none";
		});


		speakerSelect.addEventListener("change", function()
		{
			customControls.style.display = this.value === "custom" ? "block" : "none";
		});

		function clearCustomIcon()
		{
			document.getElementById("customicon").value = "";
			customIconFile = null;
		}
				
		var colorMode = document.getElementById("colormode");
		var solidColorWrap = document.getElementById("solidcolorwrap");

		function updateColorMode()
		{
			solidColorWrap.style.display = colorMode.value === "solid" ? "block" : "none";
		}

		colorMode.addEventListener("change", updateColorMode);
		
		async function generate()
		{
			clear_frames();

			var animated = document.getElementById("isanimated").checked;
			var speaker = document.getElementById("speaker").value;
			var text = document.getElementById("textboxtext").value;

			if (animated)
			{
				var prerendertext = (await rendertextbox(speaker, text)).text;
				await rendertextbox(speaker, "");
				await set_preview_image(document.getElementById("textbox").toDataURL("image/png"));

				let current = "";

				for (var piece of prerendertext)
				{
					if (piece === "\n")
					{
						current += "\n";
						continue;
					}

					current += piece;

					await rendertextbox(speaker, current);
					await add_frame();
				}
			}
			else
			{
				await rendertextbox(speaker, text);
				await add_frame();
			}
			await generate_frames();
		}

		updateColorMode();
		rendertextbox().then(function()
		{
			set_preview_image(document.getElementById("textbox").toDataURL("image/png"));
		});


		function validateAnimatedSettings() 
		{
			if (isNaN(Number(animatedspeedInput.value)) || animatedspeedInput.value === "")
				animatedspeedInput.value = 50;

			if (isNaN(Number(animatedrestartDelayInput.value)) || animatedrestartDelayInput.value === "")
				animatedrestartDelayInput.value = 300;
		}

		animatedspeedInput.addEventListener("change", validateAnimatedSettings);
		animatedrestartDelayInput.addEventListener("change", validateAnimatedSettings);
	</script>
</html>
